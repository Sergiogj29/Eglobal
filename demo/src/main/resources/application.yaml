server:
 port: 8080

 spring:
  application:
    name: demo

  datasource:
    url: jdbc:h2:nem:bancosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
   console:
      enabled: true
      path: /h2-console

  jpa:
   hibernate:
     ddl-auto: create-drop
   show-sql: true
   properties:
     hibernate:
       format-sql: true
   database-platform: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.eglobal.bancos: DEBUG
    org.springframework.web: INFO
  pattern:
    console:  "%d{yyyy-MM-dd HH:mm:ss} [%threade] %-5level %logger{36} - %msg%n"